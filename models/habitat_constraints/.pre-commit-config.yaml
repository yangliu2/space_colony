repos:
  - repo: local
    hooks:
      - id: black
        name: Black (Code Formatter)
        entry: uv run black --line-length=89 src tests
        language: system
        pass_filenames: false
        always_run: true

      - id: flake8
        name: Flake8 (Linter)
        entry: uv run flake8 src tests --max-line-length=89 --count --statistics
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      - id: mypy
        name: Mypy (Type Checker)
        entry: uv run mypy src --no-error-summary
        language: system
        pass_filenames: false
        always_run: true

      - id: pytest
        name: Pytest (Unit Tests)
        entry: uv run pytest tests/ -v --tb=short
        language: system
        pass_filenames: false
        always_run: true
