site_name: Space Colony — Constraint Study
site_url: https://docs.spinhabitat.com/
site_description: Physics-based feasibility analysis for O'Neill cylinder habitats
repo_url: https://github.com/fangfanglai/space_colony

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: light blue
  features:
    - navigation.sections
    - navigation.top
    - toc.integrate

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences
  - admonition
  - toc:
      permalink: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md

  - "1. How Does It Work?":
    - Artificial Gravity: plans/intuition_artificial_gravity.md
    - Centripetal Acceleration: plans/intuition_centripetal_acceleration.md
    - Angular Velocity: plans/intuition_angular_velocity.md
    - Does General Relativity Matter?: plans/general_relativity_and_artificial_gravity.md

  - "2. Can Humans Live There?":
    - Vestibular (RPM limit): plans/constraint_vestibular.md
    - Gravity Level: plans/constraint_gravity_minimum.md
    - Gravity Gradient (head-to-foot): plans/constraint_gravity_gradient.md
    - Coriolis Effect: plans/constraint_coriolis.md
    - Cross-Coupling: plans/constraint_cross_coupling.md
    - Atmosphere: plans/constraint_biological.md

  - "3. Will the Structure Hold?":
    - Hoop Stress & Materials: plans/structural_engineering.md
    - Rim Speed (material limit): plans/constraint_rim_speed.md
    - Cylinder Length & Counter-Rotation: plans/constraint_cylinder_length.md
    - Rotational Stability: plans/constraint_rotational_stability.md
    - Spin-Up Energy: plans/constraint_spinup_energy.md

  - "4. Life Support":
    - Agriculture Area: plans/constraint_agriculture.md
    - Thermal Management: plans/constraint_thermal.md
    - Energy Budget: plans/constraint_energy.md

  - "5. The Design":
    - External Mirrors: plans/mirror_geometry.md
    - Interior Space: plans/interior_space_utilization.md
    - Material Estimates: plans/construction_material_estimates.md

  - "6. Findings":
    - "001: Human Comfort Boundaries": conclusions/001_human_comfort_boundaries.md
    - "002: Full Constraint Analysis": conclusions/002_full_constraint_analysis.md
    - "003: Biological Constraints & Monte Carlo": conclusions/003_biological_constraints_and_monte_carlo.md
    - "004: Structural Constraints": conclusions/004_structural_constraints.md
    - Feasible Design Space: conclusions/feasible_habitat_design_space.md

  - "7. Open Questions":
    - Minimum Gravity Level: plans/contested_partial_gravity.md
    - Maximum Rotation Rate: plans/contested_rotation_rate.md
    - Radiation Limits & LNT: plans/contested_radiation.md

  - Reference:
    - Literature — Human Factors: plans/literature_review_human_factors.md
    - Literature — Structural: plans/literature_review_structural.md
    - Q&A — Structural Design: plans/qa_structural_design.md
